name: 🤖 AI/机器人岗位日报推送

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  job-push:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: wecom-bot

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 运行抓取与推送
        run: python run.py

      - name: 提交数据更新
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json data/company_cache.json data/logs/ || true
          git diff --staged --quiet && echo "SKIP: no changes" || (git commit -m "📊 update records" && git push)
