name: 🤖 AI/机器人岗位日报推送

on:
  schedule:
    - cron: '0 7 * * *'      # UTC 7:00 = 北京时间 15:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 需要写权限来推送
permissions:
  contents: write

jobs:
  job-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码（wecom-bot 分支）
        uses: actions/checkout@v4
        with:
          ref: wecom-bot

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行岗位抓取与推送
        run: python run.py

      - name: 提交数据更新
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json data/company_cache.json data/logs/
          git diff --staged --quiet || git commit -m "📊 更新推送记录 [skip ci]"
          git push
