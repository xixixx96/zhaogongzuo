name: 🤖 AI/机器人岗位日报推送

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  job-push:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          ref: wecom-bot

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行
        run: python run.py

      - name: 提交数据更新
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json data/company_cache.json data/logs/ || true
          if git diff --staged --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "📊 更新推送记录 [skip ci]"
            git push
          fi
